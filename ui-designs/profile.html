<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 - 电瓶车租赁管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: #f8f9fa;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .status-bar {
            height: 44px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .header {
            background: linear-gradient(135deg, #6c5ce7 0%, #a55eea 100%);
            padding: 30px 24px;
            color: #ffffff;
            text-align: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .username {
            font-size: 18px;
            font-weight: 600;
        }

        .userid {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .content {
            padding: 16px;
            height: calc(100% - 200px);
            overflow-y: auto;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 12px;
        }

        /* 功能按钮 */
        .menu-list {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .menu-item {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f2f6;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: #f8f9fa;
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 20px;
        }

        .menu-text {
            font-size: 14px;
            color: #2d3436;
        }

        .menu-arrow {
            font-size: 14px;
            color: #b2bec3;
        }

        /* 底部导航 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: #ffffff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #f0f0f0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #b2bec3;
            font-size: 10px;
            cursor: pointer;
        }

        .nav-item.active {
            color: #6c5ce7;
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <!-- 状态栏 -->
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>

        <!-- 头部 -->
        <div class="header">
            <div class="avatar">👤</div>
            <div class="username">商家用户</div>
            <div class="userid">ID: 10001</div>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <div class="menu-list">
                <div class="menu-item">
                    <div class="menu-left">
                        <span class="menu-icon">📋</span>
                        <span class="menu-text">历史订单</span>
                    </div>
                    <span class="menu-arrow">›</span>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">📋</span>
                <span>订单</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">📊</span>
                <span>统计</span>
            </div>
            <div class="nav-item active">
                <span class="nav-icon">👤</span>
                <span>我的</span>
            </div>
        </div>
    </div>
</body>
</html>
