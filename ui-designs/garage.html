<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的车库 - 电瓶车租赁管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: #f8f9fa;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .status-bar {
            height: 44px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .header {
            background: linear-gradient(135deg, #0984e3 0%, #74b9ff 100%);
            padding: 20px 24px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
        }

        .add-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .tabs {
            background: #ffffff;
            display: flex;
            padding: 12px 16px;
            gap: 8px;
        }

        .tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #636e72;
            background: #f1f2f6;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #0984e3;
            color: #ffffff;
        }

        .content {
            padding: 16px;
            height: calc(100% - 180px);
            overflow-y: auto;
        }

        .vehicle-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .vehicle-image {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
        }

        .vehicle-status {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-renting {
            background: #fdcb6e;
            color: #d35400;
        }

        .status-available {
            background: #00b894;
            color: #ffffff;
        }

        .status-pending {
            background: #e17055;
            color: #ffffff;
        }

        .vehicle-info {
            padding: 16px;
        }

        .vehicle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .vehicle-name {
            font-size: 16px;
            font-weight: 700;
            color: #2d3436;
        }

        .vehicle-brand {
            font-size: 12px;
            color: #636e72;
            background: #f1f2f6;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .info-label {
            font-size: 11px;
            color: #b2bec3;
        }

        .info-value {
            font-size: 13px;
            color: #2d3436;
            font-weight: 500;
        }

        .info-value.license {
            background: #dfe6e9;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .vehicle-note {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f1f2f6;
            font-size: 12px;
            color: #636e72;
        }

        .note-label {
            color: #b2bec3;
            margin-bottom: 4px;
        }

        .vehicle-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f1f2f6;
        }

        .action-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .action-btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .btn-rent {
            background: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);
            color: #ffffff;
        }

        .btn-renew {
            background: linear-gradient(135deg, #fdcb6e 0%, #f39c12 100%);
            color: #ffffff;
        }

        .btn-settle {
            background: linear-gradient(135deg, #6c5ce7 0%, #a55eea 100%);
            color: #ffffff;
        }

        .btn-edit {
            background: #f1f2f6;
            color: #636e72;
        }

        .btn-delete {
            background: #ffeaea;
            color: #e74c3c;
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: #ffffff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #f0f0f0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #b2bec3;
            font-size: 10px;
            cursor: pointer;
        }

        .nav-item.active {
            color: #0984e3;
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <!-- 状态栏 -->
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>

        <!-- 头部 -->
        <div class="header">
            <div class="header-left">
                <div class="back-btn">←</div>
                <div class="header-title">我的车库</div>
            </div>
            <div class="add-btn">+</div>
        </div>

        <!-- 标签页 -->
        <div class="tabs">
            <div class="tab active">全部</div>
            <div class="tab">空闲</div>
            <div class="tab">租聘中</div>
            <div class="tab">待结算</div>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <!-- 车辆1 - 租聘中 -->
            <div class="vehicle-card">
                <div class="vehicle-image">
                    🛵
                    <span class="vehicle-status status-renting">租聘中</span>
                </div>
                <div class="vehicle-info">
                    <div class="vehicle-header">
                        <div>
                            <div class="vehicle-name">雅迪DT3</div>
                            <span class="vehicle-brand">雅迪</span>
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">车架号</span>
                            <span class="info-value">L5Y2023A12345</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">颜色</span>
                            <span class="info-value">石墨黑</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">牌照号</span>
                            <span class="info-value license">A88888</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">电池型号</span>
                            <span class="info-value">72V 23Ah</span>
                        </div>
                    </div>
                    <div class="vehicle-note">
                        <div class="note-label">备注</div>
                        <div>车身有轻微划痕，后视镜需更换</div>
                    </div>
                    <div class="vehicle-actions">
                        <button class="action-btn btn-renew">续租</button>
                        <button class="action-btn btn-settle">结算</button>
                        <button class="action-btn btn-edit">编辑</button>
                        <button class="action-btn btn-delete">删除</button>
                    </div>
                </div>
            </div>

            <!-- 车辆2 - 空闲 -->
            <div class="vehicle-card">
                <div class="vehicle-image">
                    🚲
                    <span class="vehicle-status status-available">空闲</span>
                </div>
                <div class="vehicle-info">
                    <div class="vehicle-header">
                        <div>
                            <div class="vehicle-name">爱玛晴天</div>
                            <span class="vehicle-brand">爱玛</span>
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">车架号</span>
                            <span class="info-value">L5Y2023B67890</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">颜色</span>
                            <span class="info-value">奶白色</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">牌照号</span>
                            <span class="info-value license">A99999</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">电池型号</span>
                            <span class="info-value">60V 20Ah</span>
                        </div>
                    </div>
                    <div class="vehicle-note">
                        <div class="note-label">备注</div>
                        <div>新车刚入库，暂无异常</div>
                    </div>
                    <div class="vehicle-actions">
                        <button class="action-btn btn-rent">租聘</button>
                        <button class="action-btn btn-edit">编辑</button>
                        <button class="action-btn btn-delete">删除</button>
                    </div>
                </div>
            </div>

            <!-- 车辆3 - 待结算 -->
            <div class="vehicle-card">
                <div class="vehicle-image">
                    🛵
                    <span class="vehicle-status status-pending">待结算</span>
                </div>
                <div class="vehicle-info">
                    <div class="vehicle-header">
                        <div>
                            <div class="vehicle-name">台铃萌彩</div>
                            <span class="vehicle-brand">台铃</span>
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">车架号</span>
                            <span class="info-value">L5Y2023C11223</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">颜色</span>
                            <span class="info-value">渐变粉</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">牌照号</span>
                            <span class="info-value license">A77777</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">电池型号</span>
                            <span class="info-value">48V 14Ah</span>
                        </div>
                    </div>
                    <div class="vehicle-note">
                        <div class="note-label">备注</div>
                        <div>客户刚还车，待检查结算</div>
                    </div>
                    <div class="vehicle-actions">
                        <button class="action-btn btn-renew">续租</button>
                        <button class="action-btn btn-settle">结算</button>
                        <button class="action-btn btn-edit">编辑</button>
                        <button class="action-btn btn-delete">删除</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">📋</span>
                <span>订单</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">📊</span>
                <span>统计</span>
            </div>
            <div class="nav-item active">
                <span class="nav-icon">👤</span>
                <span>我的</span>
            </div>
        </div>
    </div>
</body>
</html>
